services:
  recommender:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-true}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      # Point at the mounted service-account key so ADC works in the container.
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-sa.json
      - DATABASE_URL=${DATABASE_URL:-postgres://recommender:recommender@postgres:5432/recommender?sslmode=disable}
      - POSTER_DIR=/data/posters
      - PORT=${PORT:-8080}
    volumes:
      - ./data:/data
      # Mount a GCP service-account key (read-only) for Vertex AI auth.
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-sa.json:ro
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-recommender}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-recommender}
      - POSTGRES_DB=${POSTGRES_DB:-recommender}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recommender} -d ${POSTGRES_DB:-recommender}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
